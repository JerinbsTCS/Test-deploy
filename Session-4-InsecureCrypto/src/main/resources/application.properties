spring.application.name=insecure-crypto

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:adobedb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true

# Encryption key (16 bytes for AES-128)
app.crypto.secret=${S4_SECRET:ThisIsA16ByteKey}

# CTF flag — injected via environment variable at runtime
app.ctf-flag=${S4_FLAG:flag{3CB_m0d3_1s_br0k3n!}}
