name: "Session 3 — XXE"

on:
  push:
    branches: [main]
    paths:
      - "FixItFriday/Session-3-XXE/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fixitfriday/session-3-xxe
  PROJECT_ROOT: FixItFriday
  SESSION_DIR: Session-3-XXE
  JAVA_VERSION: "17"

jobs:
  build-and-push:
    name: Build & Push Image
    environment: FixItFriday
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ env.PROJECT_ROOT }}/pom.xml

      - name: Build with Maven
        run: ./mvnw -B -ntp package -pl ${{ env.SESSION_DIR }} -am -DskipTests
        working-directory: ${{ env.PROJECT_ROOT }}

      - name: Run tests
        run: ./mvnw -B -ntp verify -pl ${{ env.SESSION_DIR }} -am
        working-directory: ${{ env.PROJECT_ROOT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.PROJECT_ROOT }}/${{ env.SESSION_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            S3_FLAG1=${{ vars.S3_FLAG1 }}
            S3_FLAG2=${{ vars.S3_FLAG2 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
